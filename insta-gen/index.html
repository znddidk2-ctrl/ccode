<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>인스타 카드 생성기</title>

<!-- Pretendard (100~900) — 디자인 폰트 통일 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

<style>
  :root { --bg:#16130f; --panel:#211c17; --line:#3a322a; --accent:#e0668f; --text:#f3ede7; --muted:#9c9088; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
  body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; gap: 28px; padding: 28px; }

  /* ── 미리보기 ── */
  .stage-wrap { flex: 0 0 auto; }
  #stage {
    width: 432px; height: 540px; border-radius: 14px;
    box-shadow: 0 18px 50px rgba(0,0,0,.5); cursor: grab; touch-action: none;
    background: #000;
  }
  #stage.drag { cursor: grabbing; }
  .hint { color: var(--muted); font-size: 13px; margin-top: 10px; text-align: center; font-weight: 300; }

  /* ── 컨트롤 패널 ── */
  .panel { flex: 1; max-width: 420px; display: flex; flex-direction: column; gap: 18px; }
  h1 { font-size: 20px; font-weight: 700; }
  h1 small { font-weight: 300; color: var(--muted); font-size: 13px; display: block; margin-top: 4px; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
  .card h2 { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .5px; margin-bottom: 12px; text-transform: uppercase; }

  .upload { display: block; border: 1.5px dashed var(--line); border-radius: 10px; padding: 22px; text-align: center; cursor: pointer; transition: .15s; font-weight: 500; }
  .upload:hover { border-color: var(--accent); color: #fff; }
  .upload input { display: none; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .field input[type=text] {
    width: 100%; background: #18130f; border: 1px solid var(--line); border-radius: 8px;
    color: var(--text); padding: 9px 11px; font-size: 14px; font-weight: 500;
  }
  .field input:focus { outline: none; border-color: var(--accent); }

  .slider { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .slider label { flex: 0 0 78px; font-size: 12px; color: var(--muted); }
  .slider input[type=range] { flex: 1; accent-color: var(--accent); }
  .slider .val { flex: 0 0 42px; text-align: right; font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }

  .btn { width: 100%; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

  .status { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 16px; font-weight: 300; }
  .status.busy { color: #f0c674; }
</style>
</head>
<body>
  <div class="stage-wrap">
    <canvas id="stage" width="1080" height="1350"></canvas>
    <div class="hint">사진 위를 <b>드래그</b>해서 위치 조정 · 휠/슬라이더로 <b>확대</b></div>
  </div>

  <div class="panel">
    <h1>인스타 카드 생성기 <small>① 텍스트 · ② 사진(크롭) · ③ 배경지(원본 70%)</small></h1>

    <div class="card">
      <h2>1 · 사진 업로드</h2>
      <label class="upload">사진 1장을 선택하거나 끌어다 놓으세요
        <input type="file" id="file" accept="image/*">
      </label>
    </div>

    <div class="card">
      <h2>2 · 텍스트 (붙여넣고 수정)</h2>
      <div class="field"><label>상단 헤드라인</label><input type="text" id="t_headline" value="원형 최초공개"></div>
      <div class="field"><label>타이틀 (작품·시리즈)</label><input type="text" id="t_title" value="나루토 질풍전 G.E.M. 시리즈"></div>
      <div class="field"><label>제품명</label><input type="text" id="t_product" value="테노히라 나미카제 미나토 (미채색)"></div>
      <div class="field"><label>푸터</label><input type="text" id="t_footer" value="메가하우스 공식 스토어"></div>
    </div>

    <div class="card">
      <h2>3 · 사진 크롭 / 배경지</h2>
      <div class="slider"><label>사진 확대</label><input type="range" id="s_zoom" min="100" max="300" value="100"><span class="val" id="v_zoom">1.0×</span></div>
      <div class="slider"><label>배경 불투명</label><input type="range" id="s_op" min="20" max="100" value="70"><span class="val" id="v_op">70%</span></div>
      <div class="slider"><label>배경 흐림</label><input type="range" id="s_blur" min="0" max="40" value="14"><span class="val" id="v_blur">14</span></div>
    </div>

    <button class="btn btn-primary" id="download" disabled>PNG 다운로드 (1080×1350)</button>
  </div>

<script>
const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
const W = 1080, H = 1350;

// 레이아웃 좌표 (사진 프레임)
const FRAME = { x: 110, y: 250, w: 860, h: 760, r: 36 };

const state = {
  img: null,
  fg: { zoom: 1, panX: 0, panY: 0 },
  bg: { opacity: 0.70, blur: 14 },
  text: { headline:'원형 최초공개', title:'나루토 질풍전 G.E.M. 시리즈', product:'테노히라 나미카제 미나토 (미채색)', footer:'메가하우스 공식 스토어' },
};

// ── 둥근 사각형 path ──
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y);
  c.arcTo(x+w, y,   x+w, y+h, r);
  c.arcTo(x+w, y+h, x,   y+h, r);
  c.arcTo(x,   y+h, x,   y,   r);
  c.arcTo(x,   y,   x+w, y,   r);
  c.closePath();
}

// 이미지를 영역에 cover + zoom + pan 으로 채우는 좌표 계산
function coverRect(iw, ih, fw, fh, zoom, panX, panY) {
  const base = Math.max(fw/iw, fh/ih);
  const scale = base * zoom;
  const dw = iw*scale, dh = ih*scale;
  const maxX = Math.max(0, (dw-fw)/2), maxY = Math.max(0, (dh-fh)/2);
  const px = Math.max(-maxX, Math.min(maxX, panX));
  const py = Math.max(-maxY, Math.min(maxY, panY));
  return { dw, dh, px, py };
}

function render() {
  ctx.clearRect(0,0,W,H);

  // 3층 — 배경지: 어두운 베이스 + 원본 cover (불투명 70%, 흐림)
  ctx.fillStyle = '#16130f';
  ctx.fillRect(0,0,W,H);
  if (state.img) {
    ctx.save();
    ctx.globalAlpha = state.bg.opacity;
    ctx.filter = state.bg.blur ? `blur(${state.bg.blur}px)` : 'none';
    const b = coverRect(state.img.width, state.img.height, W+80, H+80, 1, 0, 0); // 약간 키워 블러 가장자리 가림
    ctx.drawImage(state.img, (W - b.dw)/2, (H - b.dh)/2, b.dw, b.dh);
    ctx.restore();
  }

  // 텍스트 가독용 상/하 스크림
  let g = ctx.createLinearGradient(0,0,0,360);
  g.addColorStop(0,'rgba(12,10,8,.75)'); g.addColorStop(1,'rgba(12,10,8,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,360);
  g = ctx.createLinearGradient(0,1010,0,H);
  g.addColorStop(0,'rgba(12,10,8,0)'); g.addColorStop(1,'rgba(12,10,8,.85)');
  ctx.fillStyle = g; ctx.fillRect(0,1010,W,H-1010);

  // 2층 — 사진 (크롭, 둥근 프레임 + 흰 테두리 + 그림자)
  if (state.img) {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,.45)'; ctx.shadowBlur = 40; ctx.shadowOffsetY = 18;
    ctx.fillStyle = '#fff';
    roundRect(ctx, FRAME.x-6, FRAME.y-6, FRAME.w+12, FRAME.h+12, FRAME.r+4); ctx.fill();
    ctx.restore();

    ctx.save();
    roundRect(ctx, FRAME.x, FRAME.y, FRAME.w, FRAME.h, FRAME.r); ctx.clip();
    const f = coverRect(state.img.width, state.img.height, FRAME.w, FRAME.h, state.fg.zoom, state.fg.panX, state.fg.panY);
    ctx.drawImage(state.img, FRAME.x + (FRAME.w-f.dw)/2 + f.px, FRAME.y + (FRAME.h-f.dh)/2 + f.py, f.dw, f.dh);
    ctx.restore();
  }

  // 1층 — 텍스트 (Pretendard, light~bold)
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,.5)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 2;

  setFont(800, 76); ctx.fillText(state.text.headline, W/2, 150);
  ctx.shadowBlur = 8;
  setFont(700, 52); ctx.fillText(state.text.title, W/2, 1110);
  setFont(300, 40); ctx.fillStyle = '#efe8e2'; ctx.fillText(state.text.product, W/2, 1170);

  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,.28)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(180,1238); ctx.lineTo(900,1238); ctx.stroke();

  ctx.fillStyle = '#e8e1db';
  setFont(500, 34); ctx.fillText(state.text.footer, W/2, 1300);
}
function setFont(weight, size) { ctx.font = `${weight} ${size}px Pretendard, sans-serif`; }

// ── 이미지 로드 (파일 입력 + 테스트 공용) ──
function loadImage(src) {
  return new Promise((res) => {
    const im = new Image();
    im.onload = () => { state.img = im; state.fg = {zoom:1,panX:0,panY:0}; document.getElementById('download').disabled = false; render(); res(im); };
    im.src = src;
  });
}
window.__loadImage = loadImage; // 검증용

document.getElementById('file').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if (!file) return;
  await loadImage(URL.createObjectURL(file));
});

// 끌어다 놓기(드롭)
['dragover','drop'].forEach(ev => document.addEventListener(ev, e => e.preventDefault()));
document.addEventListener('drop', async (e) => {
  const file = [...(e.dataTransfer?.files || [])].find(f => f.type.startsWith('image/'));
  if (file) await loadImage(URL.createObjectURL(file));
});

// ── 텍스트 필드 → 즉시 반영 ──
for (const k of ['headline','title','product','footer']) {
  document.getElementById('t_'+k).addEventListener('input', (e) => { state.text[k] = e.target.value; render(); });
}

// ── 슬라이더 ──
const z = document.getElementById('s_zoom'), op = document.getElementById('s_op'), bl = document.getElementById('s_blur');
z.addEventListener('input', () => { state.fg.zoom = z.value/100; document.getElementById('v_zoom').textContent = (z.value/100).toFixed(1)+'×'; render(); });
op.addEventListener('input', () => { state.bg.opacity = op.value/100; document.getElementById('v_op').textContent = op.value+'%'; render(); });
bl.addEventListener('input', () => { state.bg.blur = +bl.value; document.getElementById('v_blur').textContent = bl.value; render(); });

// ── 사진 드래그(팬) + 휠(줌) ──
let dragging = false, lx = 0, ly = 0;
const toCanvas = (e) => { const r = cv.getBoundingClientRect(); return { sx: cv.width/r.width, sy: cv.height/r.height, x: e.clientX-r.left, y: e.clientY-r.top }; };
cv.addEventListener('pointerdown', (e) => { if (!state.img) return; dragging = true; cv.classList.add('drag'); cv.setPointerCapture(e.pointerId); const p = toCanvas(e); lx = p.x; ly = p.y; });
cv.addEventListener('pointermove', (e) => { if (!dragging) return; const p = toCanvas(e); state.fg.panX += (p.x-lx)*p.sx; state.fg.panY += (p.y-ly)*p.sy; lx = p.x; ly = p.y; render(); });
cv.addEventListener('pointerup', () => { dragging = false; cv.classList.remove('drag'); });
cv.addEventListener('wheel', (e) => { if (!state.img) return; e.preventDefault(); state.fg.zoom = Math.max(1, Math.min(3, state.fg.zoom + (e.deltaY < 0 ? .05 : -.05))); z.value = Math.round(state.fg.zoom*100); document.getElementById('v_zoom').textContent = state.fg.zoom.toFixed(1)+'×'; render(); }, { passive:false });

// ── 다운로드 ──
document.getElementById('download').addEventListener('click', () => {
  cv.toBlob((b) => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'insta-card.png'; a.click(); }, 'image/png');
});

// 폰트 로드 후 첫 렌더
(async () => { try { await document.fonts.load('800 76px Pretendard'); await document.fonts.load('300 40px Pretendard'); } catch {} render(); })();
</script>
</body>
</html>
